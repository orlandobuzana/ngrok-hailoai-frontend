<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAILO // TERMINAL_V1.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #04060d;
            --panel:     #080c18;
            --cyan:      #00ffe7;
            --pink:      #ff2d6b;
            --amber:     #f5a623;
            --dim:       #1a2238;
            --muted:     #3a4a62;
            --text:      #cdd8f0;

            --glow-c: 0 0 8px rgba(0,255,231,0.6), 0 0 24px rgba(0,255,231,0.2);
            --glow-p: 0 0 8px rgba(255,45,107,0.7), 0 0 24px rgba(255,45,107,0.2);
            --glow-a: 0 0 8px rgba(245,166,35,0.6);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* scanline overlay */
            background-image:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,255,231,0.013) 2px,
                    rgba(0,255,231,0.013) 4px
                ),
                radial-gradient(ellipse at 50% 0%, rgba(0,80,60,0.35) 0%, transparent 65%),
                radial-gradient(ellipse at 80% 100%, rgba(80,0,40,0.3) 0%, transparent 55%);
        }

        .terminal {
            width: 100%;
            max-width: 820px;
            border: 1px solid rgba(0,255,231,0.18);
            border-radius: 6px;
            box-shadow:
                0 0 0 1px rgba(0,255,231,0.05),
                0 0 40px rgba(0,255,231,0.07),
                0 30px 80px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* ── Title bar ── */
        .titlebar {
            background: linear-gradient(90deg, #060a14 0%, #0d1628 50%, #060a14 100%);
            border-bottom: 1px solid rgba(0,255,231,0.12);
            padding: 0 20px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .titlebar::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            opacity: 0.5;
        }

        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-r { background: var(--pink); box-shadow: 0 0 6px var(--pink); }
        .dot-y { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
        .dot-g { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }

        .title-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--cyan);
            text-shadow: var(--glow-c);
            margin-left: 8px;
        }

        .titlebar-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--cyan);
            font-size: 0.68rem;
            letter-spacing: 1.5px;
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: var(--glow-c);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Body ── */
        .terminal-body {
            background: var(--panel);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ── Chat box ── */
        #chat-box {
            height: 420px;
            overflow-y: auto;
            padding: 16px;
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(0,255,231,0.1);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            /* inner glow */
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
            scroll-behavior: smooth;
        }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(0,255,231,0.25); border-radius: 2px; }

        .msg-wrapper {
            animation: slideIn 0.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .label {
            font-size: 0.68rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .label::before {
            content: '';
            display: inline-block;
            width: 16px; height: 1px;
        }

        .user-label { color: var(--pink); }
        .user-label::before { background: var(--pink); box-shadow: var(--glow-p); }

        .ai-label { color: var(--cyan); }
        .ai-label::before { background: var(--cyan); box-shadow: var(--glow-c); }

        .bubble {
            padding: 14px 16px;
            border-radius: 3px;
            line-height: 1.7;
            font-size: 0.9rem;
            white-space: pre-wrap;
            position: relative;
        }

        .user-bubble {
            background: rgba(255,45,107,0.06);
            border: 1px solid rgba(255,45,107,0.2);
            border-left: 2px solid var(--pink);
            color: #e8c0c8;
        }

        .ai-bubble {
            background: rgba(0,255,231,0.04);
            border: 1px solid rgba(0,255,231,0.15);
            border-left: 2px solid var(--cyan);
            color: var(--text);
        }

        /* corner accents */
        .bubble::before, .bubble::after {
            content: '';
            position: absolute;
            width: 6px; height: 6px;
        }
        .bubble::before { top: -1px; right: -1px; border-top: 1px solid; border-right: 1px solid; }
        .bubble::after  { bottom: -1px; right: -1px; border-bottom: 1px solid; border-right: 1px solid; }
        .user-bubble::before, .user-bubble::after { border-color: rgba(255,45,107,0.4); }
        .ai-bubble::before,   .ai-bubble::after   { border-color: rgba(0,255,231,0.3); }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--muted);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--muted), transparent);
            opacity: 0.3;
        }

        /* ── Input row ── */
        .input-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        .input-wrap {
            flex: 1;
            position: relative;
        }

        .input-prefix {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cyan);
            font-size: 0.9rem;
            opacity: 0.7;
            pointer-events: none;
            user-select: none;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 14px 14px 34px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0,255,231,0.2);
            border-radius: 3px;
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: border-color 0.2s, box-shadow 0.2s;
            caret-color: var(--cyan);
        }

        input[type="text"]::placeholder {
            color: var(--muted);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: rgba(0,255,231,0.55);
            box-shadow: var(--glow-c), inset 0 0 10px rgba(0,255,231,0.03);
        }

        input[type="text"]:disabled {
            opacity: 0.5;
        }

        button {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0 22px;
            border-radius: 3px;
            border: 1px solid var(--cyan);
            background: transparent;
            color: var(--cyan);
            cursor: pointer;
            box-shadow: var(--glow-c);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--cyan);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.2s ease;
            z-index: 0;
        }

        button span { position: relative; z-index: 1; }

        button:hover::before { transform: scaleX(1); }
        button:hover { color: #000; box-shadow: 0 0 20px var(--cyan); }

        button:disabled {
            border-color: var(--muted);
            color: var(--muted);
            box-shadow: none;
            cursor: not-allowed;
        }
        button:disabled::before { display: none; }

        /* ── Footer ── */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            color: var(--muted);
            padding-top: 4px;
        }

        .footer-tag { color: rgba(0,255,231,0.3); }

        /* ── Typing cursor for streaming ── */
        .cursor {
            display: inline-block;
            width: 8px; height: 13px;
            background: var(--cyan);
            vertical-align: text-bottom;
            margin-left: 2px;
            animation: blink-cur 0.8s step-end infinite;
        }
        @keyframes blink-cur { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="terminal">
    <!-- Title bar -->
    <div class="titlebar">
        <div class="titlebar-left">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
            <span class="title-text">HAILO // DEEP_LINK_INFERENCE</span>
        </div>
        <div class="titlebar-right">
            <span>NPU_MEM: 12.4 GB</span>
            <div class="status-pill">
                <div class="status-dot"></div>
                <span>NODE ONLINE</span>
            </div>
        </div>
    </div>

    <!-- Body -->
    <div class="terminal-body">
        <div id="chat-box"></div>

        <div class="input-row">
            <div class="input-wrap">
                <span class="input-prefix">&gt;_</span>
                <input type="text" id="user-input"
                    placeholder="ENTER PROMPT..."
                    onkeydown="if(event.key === 'Enter') sendMessage()">
            </div>
            <button id="send-btn" onclick="sendMessage()"><span>EXECUTE</span></button>
        </div>

        <div class="footer">
            <span>HAILO TERMINAL v1.0 // LOCAL NODE</span>
            <span class="footer-tag">[ STREAM_MODE: SSE ]</span>
        </div>
    </div>
</div>

<script>
    const BACKEND_URL = "https://ditto-kissing-darkening.ngrok-free.dev/api/chat";
    let chatHistory = [{"role": "system", "content": "You are a tactical cyberpunk AI assistant embedded inside a local hardware node."}];

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-box');
        const promptText = inputField.value.trim();
        if (!promptText || sendBtn.disabled) return;

        inputField.disabled = true;
        sendBtn.disabled = true;

        // User message
        const userWrapper = document.createElement('div');
        userWrapper.className = 'msg-wrapper';
        userWrapper.innerHTML = `
            <div class="label user-label">USER_INPUT</div>
            <div class="bubble user-bubble">${promptText}</div>`;
        chatBox.appendChild(userWrapper);
        chatHistory.push({"role": "user", "content": promptText});
        inputField.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        // Divider
        const divider = document.createElement('div');
        divider.className = 'divider';
        divider.textContent = 'PROCESSING';
        chatBox.appendChild(divider);

        // AI message
        const aiWrapper = document.createElement('div');
        aiWrapper.className = 'msg-wrapper';
        aiWrapper.innerHTML = `<div class="label ai-label">HAILO_NODE_RESP</div>`;
        const aiTextBlock = document.createElement('div');
        aiTextBlock.className = 'bubble ai-bubble';
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        aiTextBlock.appendChild(cursor);
        aiWrapper.appendChild(aiTextBlock);
        chatBox.appendChild(aiWrapper);
        chatBox.scrollTop = chatBox.scrollHeight;

        let fullResponseText = "";

        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                body: JSON.stringify({ messages: chatHistory })
            });

            if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value, { stream: true });
                for (const line of chunk.split('\n')) {
                    const clean = line.trim();
                    if (!clean || !clean.startsWith('data:')) continue;
                    const raw = clean.replace('data:', '').trim();
                    if (raw === '[DONE]') break;
                    try {
                        const parsed = JSON.parse(raw);
                        if (parsed.content) {
                            fullResponseText += parsed.content;
                            aiTextBlock.textContent = fullResponseText;
                            aiTextBlock.appendChild(cursor);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    } catch(e) {}
                }
            }

            chatHistory.push({"role": "assistant", "content": fullResponseText});

        } catch (error) {
            aiTextBlock.textContent = "CRITICAL_ERROR: PIPELINE_DISCONNECTED";
            aiTextBlock.style.color = "var(--pink)";
            console.error(error);
        }

        // Remove cursor
        if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
        divider.textContent = 'COMPLETE';

        inputField.disabled = false;
        sendBtn.disabled = false;
        chatBox.scrollTop = chatBox.scrollHeight;
        inputField.focus();
    }
</script>

</body>
</html>
